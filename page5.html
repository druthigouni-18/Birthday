<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Memory Book</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <!-- Turn.js -->
  <script src="https://cdn.jsdelivr.net/gh/blasten/turn.js@master/turn.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #1b1b1b;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      padding: 20px;
      font-family: Arial, sans-serif;
    }

    h1 {
      color: white;
      margin-bottom: 15px;
    }

    /* FLIPBOOK SIZE (portrait) */
    #flipbook {
      width: 400px;
      height: 600px;
      max-width: 90vw;
      max-height: 75vh;
    }

    #flipbook .page {
      background: #000; /* removes white gap */
    }

    #flipbook img {
      width: 100%;
      height: 100%;
      object-fit: contain; /* no crop */
    }

    .controls {
      margin-top: 15px;
      display: flex;
      gap: 20px;
    }

    button {
      padding: 10px 20px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      background: linear-gradient(135deg, #ffd86b, #ff9f43);
      font-weight: bold;
    }

    @media (max-width: 768px) {
      #flipbook {
        width: 90vw;
        height: 70vh;
      }
    }
  </style>
</head>

<body>

<h1>📖 </h1>

<div id="flipbook">

  <div class="page"><img src="1.jpg"></div>
  <div class="page"><img src="2.jpg"></div>
  <div class="page"><img src="3.jpg"></div>
  <div class="page"><img src="4.jpg"></div>
  <div class="page"><img src="5.jpg"></div>
  <div class="page"><img src="6.jpg"></div>
  <div class="page"><img src="7.jpg"></div>
  <div class="page"><img src="8.jpg"></div>
  <div class="page"><img src="9.jpg"></div>
  <div class="page"><img src="10.jpg"></div>

</div>

<div class="controls">
  <button onclick="prevPage()">⬅ Previous</button>
  <button onclick="nextPage()">Next ➡</button>
</div>

<br>
<button onclick="location.href='page2.html'">Back</button>

<script>
  $(document).ready(function () {
    $("#flipbook").turn({
      width: 400,
      height: 600,
      autoCenter: true,
      display: "single",   // portrait book
      elevation: 50,
      gradients: true
    });
  });

  function nextPage() {
    $("#flipbook").turn("next");
  }

  function prevPage() {
    $("#flipbook").turn("previous");
  }
</script>

</body>
</html>
